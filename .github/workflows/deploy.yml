name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "content/**"
      - "quartz/**"
      - "quartz.config.yaml"
      - "quartz.lock.json"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

env:
  QUARTZ_COMMIT: 9cf87ff1c248a8ca551093214b0fec3b31415009

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Record site telemetry
        continue-on-error: true
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            EVENT="update"
          elif [[ "${{ github.event.head_commit.message }}" == "Initial publish from Obsidian" ]]; then
            EVENT="publish"
          else
            EVENT="update"
          fi

          curl -sS -f -X POST \
            "https://github-publish-telemetry.o-rouiller.workers.dev/v1/event" \
            -H "Content-Type: application/json" \
            -d "{\"event\":\"$EVENT\"}"

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Clone Quartz engine
        run: |
          git clone --depth 1 https://github.com/jackyzha0/quartz.git quartz-engine

          cd quartz-engine
          git fetch --depth 1 origin "${QUARTZ_COMMIT}"
          git checkout "${QUARTZ_COMMIT}"

      - name: Restore dependency cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.npm
            quartz-engine/.quartz/plugins
          key: quartz-${{ runner.os }}-${{ env.QUARTZ_COMMIT }}-${{ hashFiles('quartz.lock.json') }}
          restore-keys: |
            quartz-${{ runner.os }}-${{ env.QUARTZ_COMMIT }}-

      - name: Overlay user site
        run: |
          test -d content
          test -f quartz.config.yaml
          test -f quartz.lock.json

          rm -rf quartz-engine/content
          cp -r content quartz-engine/content

          cp quartz.config.yaml quartz-engine/
          cp quartz.lock.json quartz-engine/

          if [[ -d quartz ]]; then
            cp -r quartz/. quartz-engine/quartz/
          fi

      - name: Install dependencies
        working-directory: quartz-engine
        run: npm ci

      - name: Install Quartz plugins
        working-directory: quartz-engine
        run: npx quartz plugin install

      - name: Build site
        working-directory: quartz-engine
        run: npx quartz build

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: quartz-engine/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
